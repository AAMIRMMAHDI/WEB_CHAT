{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>چت آنلاین امن</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --accent: #4895ef;
            --dark: #1b263b;
            --darker: #0d1b2a;
            --light: #f8f9fa;
            --gray: #adb5bd;
            --success: #4cc9f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Vazirmatn', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--darker);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* صفحه احراز هویت */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--dark), var(--darker));
            padding: 1rem;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .auth-card h1 {
            margin-bottom: 1.2rem;
            color: var(--accent);
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.9rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: var(--light);
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* صفحه چت */
        .chat-container {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        /* هدر چت */
        .chat-header {
            background: rgba(27, 38, 59, 0.9);
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .chat-header h3 {
            font-size: 1.1rem;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* محتوای اصلی چت */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* نوار کناری */
        .chat-sidebar {
            background: rgba(27, 38, 59, 0.95);
            width: 280px;
            height: 100%;
            padding: 1rem;
            overflow-y: auto;
            position: fixed;
            right: -280px;
            top: 0;
            z-index: 20;
            transition: right 0.3s ease;
        }

        .chat-sidebar.active {
            right: 0;
        }

        .chat-sidebar h3 {
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
        }

        /* تب های چت */
        .chat-tabs {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 0.8rem;
        }

        .chat-tab {
            padding: 0.7rem 1rem;
            cursor: pointer;
            opacity: 0.7;
            font-size: 0.9rem;
            position: relative;
        }

        .chat-tab.active {
            opacity: 1;
            color: var(--accent);
        }

        .chat-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            right: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
        }

        /* پیام ها */
        .chat-messages {
            flex: 1;
            padding: 0.8rem;
            overflow-y: auto;
            background: url('https://www.transparenttextures.com/patterns/dark-geometric.png');
            -webkit-overflow-scrolling: touch;
        }

        .message {
            margin-bottom: 0.8rem;
        }

        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 0.2rem;
        }

        .message-username {
            font-weight: 600;
            margin-left: 0.4rem;
            font-size: 0.9rem;
        }

        .message-time {
            font-size: 0.7rem;
            color: var(--gray);
        }

        .message-badge {
            font-size: 0.6rem;
            background: var(--success);
            color: white;
            padding: 0.2rem 0.4rem;
            border-radius: 12px;
            margin-right: 0.4rem;
        }

        .message-content {
            background: rgba(67, 97, 238, 0.2);
            padding: 0.6rem 0.8rem;
            border-radius: 12px;
            display: inline-block;
            max-width: 90%;
            word-break: break-word;
            font-size: 0.9rem;
        }

        .message-private .message-content {
            background: rgba(76, 201, 240, 0.2);
        }

        .message-system {
            text-align: center;
            margin: 0.8rem 0;
            color: var(--gray);
            font-size: 0.8rem;
        }

        /* ورودی پیام */
        .chat-input {
            background: rgba(27, 38, 59, 0.9);
            padding: 0.8rem;
            position: relative;
        }

        .message-input {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        .message-input textarea {
            flex: 1;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: var(--light);
            resize: none;
            height: 50px;
            font-size: 0.9rem;
        }

        .message-input textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 1rem;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 50px;
        }

        .upload-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 0 0.8rem;
            height: 50px;
            display: flex;
            align-items: center;
            cursor: pointer;
            min-width: 50px;
            justify-content: center;
        }

        /* لیست کاربران */
        .users-list {
            margin-top: 0.8rem;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 0.6rem;
            border-radius: 8px;
            margin-bottom: 0.4rem;
            cursor: pointer;
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 0.6rem;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .user-info {
            flex: 1;
            font-size: 0.9rem;
        }

        .user-status {
            font-size: 0.7rem;
            color: var(--gray);
        }

        .status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 0.4rem;
        }

        .status-online {
            background: var(--success);
        }

        .status-offline {
            background: var(--gray);
        }

        /* پیش نمایش فایل */
        .file-preview {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.4rem;
            border-radius: 8px;
            margin-top: 0.4rem;
            font-size: 0.8rem;
        }

        .file-icon {
            font-size: 1.2rem;
        }

        .file-name {
            flex: 1;
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* مدیا کوئری برای موبایل */
        @media (max-width: 768px) {
            .auth-card {
                padding: 1.2rem;
            }
            
            .auth-card h1 {
                font-size: 1.3rem;
            }
            
            .input-group input {
                padding: 0.8rem;
            }
            
            .btn {
                padding: 0.8rem;
            }
            
            .menu-toggle {
                display: block;
            }
            
            .chat-sidebar {
                width: 85%;
                right: -85%;
            }
            
            .chat-tab {
                padding: 0.6rem 0.8rem;
                font-size: 0.8rem;
            }
            
            .message-content {
                max-width: 85%;
            }
            
            .message-input textarea {
                height: 45px;
                font-size: 0.85rem;
            }
            
            .send-btn, .upload-btn {
                height: 45px;
                min-width: 45px;
            }
        }

        /* مدیا کوئری برای موبایل های کوچک */
        @media (max-width: 480px) {
            .auth-card {
                padding: 1rem;
            }
            
            .auth-card h1 {
                font-size: 1.2rem;
                margin-bottom: 1rem;
            }
            
            .input-group {
                margin-bottom: 1rem;
            }
            
            .chat-header h3 {
                font-size: 1rem;
            }
            
            .chat-tab {
                padding: 0.5rem 0.6rem;
                font-size: 0.75rem;
            }
            
            .message-content {
                font-size: 0.8rem;
                padding: 0.5rem 0.7rem;
            }
            
            .message-username {
                font-size: 0.8rem;
            }
            
            .message-time {
                font-size: 0.65rem;
            }
            
            .chat-input {
                padding: 0.6rem;
            }
            
            .user-avatar {
                width: 32px;
                height: 32px;
                font-size: 0.8rem;
            }
            
            .user-info {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container" id="auth-container">
        <div class="auth-card">
            <h1>ورود به چت آنلاین</h1>
            <div class="input-group">
                <input type="text" id="username" placeholder="نام کاربری" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="رمز عبور" autocomplete="off">
            </div>
            <button class="btn" onclick="enterChat()">ورود / ثبت‌نام</button>
        </div>
    </div>

    <div class="chat-container" id="chat-container">
        <div class="chat-header">
            <button class="menu-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <h3 id="current-chat">چت گروهی</h3>
            <div>
                <span id="online-count">0</span> کاربر آنلاین
            </div>
        </div>
        
        <div class="chat-sidebar" id="chat-sidebar">
            <h3>کاربران آنلاین</h3>
            <div class="users-list" id="users-list"></div>
        </div>
        
        <div class="chat-main">
            <div class="chat-tabs">
                <div class="chat-tab active" onclick="switchTab('group')">گروهی</div>
                <div class="chat-tab" onclick="switchTab('private')" id="private-tab">خصوصی</div>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="message-system">به چت گروهی خوش آمدید!</div>
            </div>
            <div class="chat-input">
                <div class="message-input">
                    <label for="file-upload" class="upload-btn">
                        <i class="fas fa-paperclip"></i>
                        <input type="file" id="file-upload" style="display: none;" onchange="handleFileUpload()">
                    </label>
                    <textarea id="message-input" placeholder="پیام خود را بنویسید..." rows="1"></textarea>
                    <button class="send-btn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div id="private-input" style="display: none; margin-top: 0.5rem;">
                    <select id="private-recipient" style="width: 100%; padding: 0.5rem; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);">
                        <option value="">انتخاب کاربر</option>
                    </select>
                </div>
                <div id="file-preview" class="file-preview" style="display: none;">
                    <i class="fas fa-file file-icon"></i>
                    <span class="file-name"></span>
                    <i class="fas fa-times" style="cursor: pointer;" onclick="clearFilePreview()"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = '';
        let currentUserId = null;
        let currentTab = 'group';
        let lastMessageId = 0;
        let sidebarOpen = false;

        function enterChat() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!username || !password) {
                alert('لطفاً نام کاربری و رمز عبور را وارد کنید');
                return;
            }

            console.log('Attempting to login/register:', username);
            fetch('/api/users/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCsrfToken()
                },
                body: JSON.stringify({ username, password })
            }).then(response => {
                console.log('User auth response:', response.status);
                if (response.ok) {
                    return response.json();
                } else {
                    return response.json().then(data => {
                        throw new Error(data.message);
                    });
                }
            }).then(data => {
                currentUser = username;
                currentUserId = data.user_id;
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('chat-container').style.display = 'flex';
                document.getElementById('current-chat').innerHTML = `<i class="fas fa-user"></i> ${currentUser}`;
                startPolling();
                startActivityUpdate();
            }).catch(error => {
                console.error('Error during auth:', error.message);
                alert(error.message);
            });
        }

        function getCsrfToken() {
            const name = 'csrftoken';
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            console.log('CSRF Token:', cookieValue);
            return cookieValue;
        }

        function startPolling() {
            console.log('Starting polling...');
            fetchMessages();
            fetchUsers();
            setInterval(() => {
                fetchMessages();
                fetchUsers();
            }, 3000);
        }

        function startActivityUpdate() {
            console.log('Starting activity update...');
            setInterval(() => {
                console.log('Updating last activity for:', currentUser);
                fetch('/api/users/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: JSON.stringify({ username: currentUser, password: '' })
                });
            }, 30000);
        }

        function fetchMessages() {
            fetch('/api/messages/')
                .then(response => response.json())
                .then(messages => {
                    console.log('Fetched messages:', messages);
                    const messagesContainer = document.getElementById('chat-messages');
                    messages.forEach(message => {
                        if (message.id > lastMessageId) {
                            if (message.is_group || message.sender.id === currentUserId || message.recipient?.id === currentUserId) {
                                addMessage(message);
                                lastMessageId = message.id;
                            }
                        }
                    });
                    scrollToBottom();
                }).catch(error => {
                    console.error('Error fetching messages:', error);
                });
        }

        function scrollToBottom() {
            const messagesContainer = document.getElementById('chat-messages');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function fetchUsers() {
            fetch('/api/users/')
                .then(response => {
                    console.log('Users fetch response:', response.status);
                    return response.json();
                })
                .then(data => {
                    console.log('Fetched users:', data.users);
                    updateUsersList(data.users);
                }).catch(error => {
                    console.error('Error fetching users:', error);
                });
        }

        function updateUsersList(users) {
            console.log('Updating users list with:', users);
            const usersList = document.getElementById('users-list');
            const recipientSelect = document.getElementById('private-recipient');
            usersList.innerHTML = '';
            recipientSelect.innerHTML = '<option value="">انتخاب کاربر</option>';

            const otherUsers = users.filter(user => user.username !== currentUser);
            const onlineCount = otherUsers.filter(user => user.is_online).length;
            document.getElementById('online-count').textContent = onlineCount;

            if (otherUsers.length === 0) {
                usersList.innerHTML = '<p style="text-align: center; color: var(--gray);">کاربر دیگری وجود ندارد</p>';
                document.getElementById('private-tab').style.display = 'none';
                if (currentTab === 'private') {
                    switchTab('group');
                }
            } else {
                document.getElementById('private-tab').style.display = 'block';
                otherUsers.forEach(user => {
                    const userElement = document.createElement('div');
                    userElement.className = 'user-item';
                    userElement.innerHTML = `
                        <div class="user-avatar">${user.username.charAt(0)}</div>
                        <div class="user-info">
                            <div>${user.username}</div>
                            <div class="user-status">
                                <span class="status-indicator ${user.is_online ? 'status-online' : 'status-offline'}"></span>
                                ${user.is_online ? 'آنلاین' : 'آفلاین'}
                            </div>
                        </div>
                    `;
                    if (user.is_online) {
                        userElement.onclick = () => {
                            startPrivateChat(user.id);
                            toggleSidebar();
                        };
                    }
                    usersList.appendChild(userElement);

                    if (user.is_online) {
                        const option = document.createElement('option');
                        option.value = user.id;
                        option.textContent = user.username;
                        recipientSelect.appendChild(option);
                    }
                });
            }
        }

        function addMessage(message) {
            const messagesContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${message.is_group ? 'message-group' : 'message-private'}`;

            const time = new Date(message.timestamp);
            const timeStr = time.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });

            let content = message.content;
            if (message.is_file) {
                const fileExtension = message.content.split('.').pop().toLowerCase();
                let fileIcon = 'fa-file';
                if (['jpg', 'png', 'gif'].includes(fileExtension)) {
                    content = `<img src="${message.content}" style="max-width: 100%; max-height: 200px; border-radius: 8px;">`;
                } else if (fileExtension === 'mp4') {
                    content = `
                        <video controls style="max-width: 100%; max-height: 200px; border-radius: 8px;">
                            <source src="${message.content}">
                        </video>
                    `;
                } else if (fileExtension === 'pdf') {
                    fileIcon = 'fa-file-pdf';
                } else if (['zip', 'rar'].includes(fileExtension)) {
                    fileIcon = 'fa-file-archive';
                } else if (['txt', 'doc', 'docx'].includes(fileExtension)) {
                    fileIcon = 'fa-file-alt';
                }
                if (!['jpg', 'png', 'gif', 'mp4'].includes(fileExtension)) {
                    content = `
                        <div class="file-preview">
                            <i class="fas ${fileIcon} file-icon"></i>
                            <span class="file-name">${message.content.split('/').pop()}</span>
                            <a href="${message.content}" download><i class="fas fa-download"></i></a>
                        </div>
                    `;
                }
            }

            messageDiv.innerHTML = `
                <div class="message-header">
                    <span class="message-badge">${message.is_group ? 'گروهی' : 'خصوصی'}</span>
                    <span class="message-username">${message.sender.username}</span>
                    <span class="message-time">${timeStr}</span>
                </div>
                <div class="message-content">${content}</div>
            `;
            messagesContainer.appendChild(messageDiv);
        }

        function sendMessage() {
            const messageInput = document.getElementById('message-input');
            const message = messageInput.value.trim();

            if (!message && !document.getElementById('file-preview').style.display !== 'none') return;

            const data = {
                sender_id: currentUserId,
                content: message,
                is_group: currentTab === 'group',
                recipient_id: currentTab === 'private' ? document.getElementById('private-recipient').value : null
            };

            if (currentTab === 'private' && !data.recipient_id) {
                alert('لطفاً کاربر مورد نظر را انتخاب کنید');
                return;
            }

            console.log('Sending message:', data);
            fetch('/api/messages/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCsrfToken()
                },
                body: JSON.stringify(data)
            }).then(response => {
                console.log('Message send response:', response.status);
                if (response.ok) {
                    messageInput.value = '';
                    clearFilePreview();
                    fetchMessages();
                    messageInput.focus();
                } else {
                    console.error('Failed to send message');
                }
            }).catch(error => {
                console.error('Error sending message:', error);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            console.log('Switching tab to:', tab);
            document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.chat-tab[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById('private-input').style.display = tab === 'private' ? 'block' : 'none';
            document.getElementById('current-chat').textContent = tab === 'private' ? 'چت خصوصی' : 'چت گروهی';
            fetchMessages();
        }

        function startPrivateChat(userId) {
            console.log('Starting private chat with user ID:', userId);
            switchTab('private');
            document.getElementById('private-recipient').value = userId;
            document.getElementById('message-input').focus();
        }

        async function handleFileUpload() {
            const fileInput = document.getElementById('file-upload');
            const file = fileInput.files[0];

            if (!file) return;

            if (file.size > 20 * 1024 * 1024) {
                alert('حجم فایل باید کمتر از 20 مگابایت باشد');
                return;
            }

            const filePreview = document.getElementById('file-preview');
            const fileName = document.getElementById('file-preview').querySelector('.file-name');
            fileName.textContent = file.name;
            filePreview.style.display = 'flex';

            const formData = new FormData();
            formData.append('file', file);

            try {
                console.log('Uploading file...');
                const response = await fetch('/api/upload/', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: formData
                });
                const data = await response.json();
                console.log('File upload response:', data);

                if (data.status === 'success') {
                    const messageData = {
                        sender_id: currentUserId,
                        content: data.file_url,
                        is_file: true,
                        is_group: currentTab === 'group',
                        recipient_id: currentTab === 'private' ? document.getElementById('private-recipient').value : null
                    };

                    if (currentTab === 'private' && !messageData.recipient_id) {
                        alert('لطفاً کاربر مورد نظر را انتخاب کنید');
                        return;
                    }

                    fetch('/api/messages/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCsrfToken()
                        },
                        body: JSON.stringify(messageData)
                    }).then(() => {
                        fetchMessages();
                        clearFilePreview();
                    });
                } else {
                    alert(data.message);
                }
            } catch (error) {
                console.error('Error uploading file:', error);
                alert('خطا در آپلود فایل');
            }

            fileInput.value = '';
        }

        function clearFilePreview() {
            const filePreview = document.getElementById('file-preview');
            filePreview.style.display = 'none';
            document.getElementById('file-upload').value = '';
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('chat-sidebar');
            sidebarOpen = !sidebarOpen;
            if (sidebarOpen) {
                sidebar.classList.add('active');
            } else {
                sidebar.classList.remove('active');
            }
        }

        // رویدادهای لمسی و کلیک
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // بستن نوار کناری با کلیک خارج از آن
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('chat-sidebar');
            const menuToggle = document.querySelector('.menu-toggle');
            if (sidebarOpen && !sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                toggleSidebar();
            }
        });

        // تنظیم ارتفاع textarea بر اساس محتوا
        const textarea = document.getElementById('message-input');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // بارگذاری اولیه
        document.addEventListener('DOMContentLoaded', function() {
            if (window.innerWidth <= 768) {
                document.getElementById('private-tab').style.fontSize = '0.8rem';
            }
        });
    </script>
</body>
</html>
